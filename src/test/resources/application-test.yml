server:
  port: 8080
spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/glog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root

jpa:
  hibernate:
    ddl-auto: none   # 테스트 시에는 'create-drop' 추천 (테스트 DB 안전할 때)
    dialect: org.hibernate.dialect.MariaDBDialect
    show_sql: true
    format_sql: true
  properties:
    hibernate:
      show_sql: true
      format_sql: true

logging:
  level:
    org.hibernate.SQL: debug              # SQL 쿼리 출력
    org.hibernate.orm.jdbc.bind: trace    # 바인딩 파라미터 출력 (Hibernate 6+)